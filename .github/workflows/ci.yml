name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      petstore:
        image: swaggerapi/petstore
        ports:
          - 8085:8080
        env:
          SWAGGER_HOST: http://localhost:8085
          SWAGGER_BASE_PATH: /v2
    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Check Dotnet Format
      run: dotnet format whitespace CddOpenApi.slnx --verify-no-changes

    - name: Run tests
      run: make test

    - name: Run WASM linter
      run: python3 scripts/lint_wasm.py

    - name: Run Petstore Integration Tests (Original Server)
      run: python3 scripts/run_petstore_tests.py

    - name: Run Petstore Integration Tests (Generated Server)
      run: python3 scripts/run_generated_petstore_tests.py

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Build WASM
      run: dotnet workload install wasm-tools wasm-tools-net8 && make build_wasm

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "bin/cdd-csharp-wasm.zip,bin/cdd-csharp/cdd-csharp.wasm"
        makeLatest: true

    - name: Update latest tag
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git push origin :refs/tags/latest || true
        git tag -fa latest -m "Update latest tag"
        git push origin refs/tags/latest

    - name: Create latest Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: ncipollo/release-action@v1
      with:
        tag: latest
        name: "Latest Release"
        artifacts: "bin/cdd-csharp-wasm.zip,bin/cdd-csharp/cdd-csharp.wasm"
        allowUpdates: true
        replacesArtifacts: true
        makeLatest: false
