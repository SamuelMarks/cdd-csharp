name: CI

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "9.0.x"
        dotnet-quality: "preview"
    
    - name: Install wasm-tools
      run: dotnet workload install wasm-tools || true

    - name: Restore dependencies
      run: make install_deps

    - name: Build
      run: make build

    - name: Test
      run: make test

    - name: Build WASM
      run: make build_wasm

    - name: Archive normal build
      uses: actions/upload-artifact@v4
      with:
        name: cdd-csharp-bin
        path: bin/Release/net10.0/linux-x64/publish/

    - name: Archive WASM build
      uses: actions/upload-artifact@v4
      with:
        name: cdd-csharp-wasm
        path: bin/wasm/

    - name: Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          bin/Release/net10.0/linux-x64/publish/cdd-csharp
          bin/wasm/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
