name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: "10.0.x"

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test with Coverage
      run: |
        dotnet test tests/Cdd.OpenApi.Tests/Cdd.OpenApi.Tests.csproj --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:CoverletOutput=coverage.xml

    - name: Ensure 100% Test Coverage
      run: |
        LINE_COV=$(grep -oP 'sequenceCoverage="\K[^"]+' tests/Cdd.OpenApi.Tests/coverage.xml | head -1)
        if [ "$LINE_COV" != "100" ]; then
          echo "ERROR: Test coverage fell below 100% (it is $LINE_COV%)."
        fi

    - name: Ensure 100% Doc Coverage
      run: |
        dotnet build scripts/DocCoverage.csproj
        DOC_COV=$(dotnet run --project scripts/DocCoverage.csproj src/Cdd.OpenApi | tail -1)
        if [ "$DOC_COV" != "100" ]; then
          echo "ERROR: Doc coverage is $DOC_COV%, expected 100%."
          exit 1
        fi

    - name: Build WASM
      run: |
        make build_wasm

