repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: mixed-line-ending
        args: ['--fix=lf']
        exclude: \.(bat|cmd|ps1)$

-   repo: local
    hooks:
    -   id: dotnet-format
        name: Dotnet Format
        entry: python3 scripts/fallback_runner.py dotnet format CddOpenApi.slnx
        language: system
        pass_filenames: false

    -   id: build
        name: Build
        entry: python3 scripts/fallback_runner.py dotnet build CddOpenApi.slnx
        language: system
        pass_filenames: false

    -   id: tests
        name: Run tests
        entry: python3 scripts/fallback_runner.py dotnet test CddOpenApi.slnx
        language: system
        pass_filenames: false

    -   id: web-ui-tests
        name: Run Web UI C# Tests
        entry: python3 scripts/fallback_runner.py python3 run_web_ui_test.py
        language: system
        pass_filenames: false

    -   id: wasm-lint
        name: Lint WASM-breaking methods
        entry: python3 scripts/fallback_runner.py python3 scripts/lint_wasm.py
        language: system
        pass_filenames: false

    -   id: petstore-tests
        name: Run Petstore Integration Tests
        entry: python3 scripts/run_petstore_tests.py
        language: system
        pass_filenames: false

    -   id: generated-petstore-tests
        name: Run Generated Petstore Server Tests
        entry: python3 scripts/run_generated_petstore_tests.py
        language: system
        pass_filenames: false
