ci:
    skip: [dotnet-format, web-ui-tests, wasm-lint]

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: mixed-line-ending
        args: ['--fix=lf']
        exclude: \.(bat|cmd|ps1)$

-   repo: local
    hooks:
    -   id: dotnet-format
        name: Dotnet Format
        entry: python3 scripts/fallback_runner.py dotnet format whitespace CddOpenApi.slnx
        language: system
        files: \.cs$
        pass_filenames: true

    -   id: web-ui-tests
        name: Run Web UI C# Tests
        entry: python3 scripts/fallback_runner.py python3 run_web_ui_test.py
        language: system
        files: \.(py|cs)$
        pass_filenames: false

    -   id: wasm-lint
        name: Lint WASM-breaking methods
        entry: python3 scripts/fallback_runner.py python3 scripts/lint_wasm.py
        language: system
        files: \.(py|cs)$
        pass_filenames: false
