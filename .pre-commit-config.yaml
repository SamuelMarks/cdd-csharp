repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: mixed-line-ending
        args: ['--fix=lf']
        exclude: \.(bat|cmd|ps1)$

-   repo: local
    hooks:
    -   id: dotnet-format
        name: Dotnet Format
        entry: dotnet format CddOpenApi.slnx
        language: system
        pass_filenames: false

    -   id: build
        name: Build
        entry: dotnet build CddOpenApi.slnx
        language: system
        pass_filenames: false

    -   id: tests
        name: Run tests
        entry: dotnet test CddOpenApi.slnx
        language: system
        pass_filenames: false

    -   id: web-ui-tests
        name: Run Web UI C# Tests
        entry: python3 run_web_ui_test.py
        language: system
        pass_filenames: false
